name: Deploy backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: "3.12" 
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt 

      - name: Run tests
        run: pytest 

  deploy:
    needs: test 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'camilarod02/notes-app-backend'
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4 

      - name: Create deployment package
        run: |
          zip -r deploy.zip \
            Dockerfile \
            Dockerrun.aws.json \
            requirements.txt \
            app \
            .dockerignore \
            .ebextensions

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22 
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ vars.EB_APPLICATION_NAME }}
          environment_name: ${{ vars.EB_ENVIRONMENT_NAME }}
          region: ${{ vars.AWS_REGION }}
          version_label: ${{ github.run_number }}-${{ github.sha }} 
          deployment_package: deploy.zip 
          use_existing_version_if_available: false 
          wait_for_deployment: true 
